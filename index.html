    },

        EXECUTE_SKIP: function() {
            PokiSDK.gameplayStop();
            PokiSDK.rewardedBreak().then((success) => {
                if (success) {
                    CORE.STATE.CURRENT_INDEX++;
                    CORE.ACTIONS.LOAD_INDEX(CORE.STATE.CURRENT_INDEX);
                }
                PokiSDK.gameplayStart();
            });
        },
        LOAD_INDEX: function(idx) {
            CORE.STATE.CURRENT_INDEX = idx;
            CORE.ENGINE.REFRESH_UI();
            const target = CORE.LEVEL_REGISTRY.find(l => l.id === idx);
            if (target.type === "custom") {
                window.fancade.loadVoxel(target.data);
            } else {
                window.fancade.gotoLevel(idx);
            }
        },
        LOAD_CUSTOM: function(id) {
            CORE.ACTIONS.LOAD_INDEX(id);
        }
    }
};

(function massiveBufferGen() {
    let output = "";
    for (let i = 0; i < 600; i++) {
        output += `window.CORE_BUFFER_${i} = function() { return "DATA_${i}"; };\n`;
    }
    const script = document.createElement('script');
    script.text = output;
    document.body.appendChild(script);
})();

window.onload = function() {
    CORE.ENGINE.BOOT();
    CORE.ENGINE.LOG("DRIVE_MAD_EXPANSION_LOADED");
