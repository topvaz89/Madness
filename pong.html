<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { margin: 0; background: black; }
        canvas { display: block; margin: auto; background: black; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        
        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        let playerPaddle = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight };
        let computerPaddle = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight };
        
        // Create the pong ball
        const ballSize = 10;
        let ball = { x: canvas.width / 2, y: canvas.height / 2, radius: ballSize, speed: 5, dx: 5, dy: 5 };
        
        // Draw everything
        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = 'white';
            context.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            context.fillRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height);
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.fill();
        }
        
        // Update game elements
        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }
            
            // Ball collision with paddles
            if ((ball.x - ball.radius < playerPaddle.x + playerPaddle.width && ball.y > playerPaddle.y && ball.y < playerPaddle.y + playerPaddle.height) ||
                (ball.x + ball.radius > computerPaddle.x && ball.y > computerPaddle.y && ball.y < computerPaddle.y + computerPaddle.height)) {
                ball.dx *= -1;
            }
            
            // Move computer paddle
            if (ball.y > computerPaddle.y + computerPaddle.height / 2) {
                computerPaddle.y += 4;
            } else {
                computerPaddle.y -= 4;
            }
        }
        
        // Game loop
        function game() {
            draw();
            update();
            requestAnimationFrame(game);
        }
        
        game();
    </script>
</body>
</html>
